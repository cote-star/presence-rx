<svg xmlns="http://www.w3.org/2000/svg" width="1920px" height="1080px" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet" style="width:1920px;height:1080px;background:#fdfdfd" role="img" aria-labelledby="title desc">
  <title id="title">Presence Rx submission architecture</title>
  <desc id="desc">A recording-ready architecture diagram for Presence Rx showing brand strategy, audience intelligence, Peec visibility, Tavily evidence, Gemini analysis, claim guardrails, and Lovable activation.</desc>

  <defs>
    <style>
      .page { fill: #fdfdfd; }
      .ink { fill: #171717; }
      .muted { fill: #6f6f6f; }
      .faint { fill: #8b8b8b; }
      .panel { fill: #ffffff; stroke: #e9e9e9; stroke-width: 1.4; }
      .lane { fill: #f8f8f8; stroke: #ececec; stroke-width: 1.2; }
      .pill { fill: #ffffff; stroke: #e7e7e7; stroke-width: 1.2; }
      .line { stroke: #b8b8b8; stroke-width: 2; fill: none; }
      .title { font: 650 44px Arial, sans-serif; fill: #171717; letter-spacing: 0; }
      .subtitle { font: 400 22px Arial, sans-serif; fill: #666666; letter-spacing: 0; }
      .laneTitle { font: 650 21px Arial, sans-serif; fill: #171717; letter-spacing: 0; }
      .cardTitle { font: 650 24px Arial, sans-serif; fill: #171717; letter-spacing: 0; }
      .body { font: 500 18px Arial, sans-serif; fill: #666666; letter-spacing: 0; }
      .small { font: 500 16px Arial, sans-serif; fill: #777777; letter-spacing: 0; }
      .tiny { font: 500 15px "Geist Variable", Inter, Arial, sans-serif; fill: #8b8b8b; letter-spacing: 0; }
      .mono { font: 500 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #747474; letter-spacing: 0; }
      .num { font: 650 16px Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .quote { font: 600 18px Arial, sans-serif; fill: #4c4c4c; letter-spacing: 0; }
      .tag { font: 600 14px Arial, sans-serif; fill: #4c4c4c; letter-spacing: 0; }
    </style>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="13" flood-color="#171717" flood-opacity="0.07"/>
    </filter>

    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#9d9d9d"/>
    </marker>
  </defs>

  <rect class="page" width="1920" height="1080"/>

  <!-- Header -->
  <text class="title" x="92" y="92">Presence Rx Architecture</text>
  <text class="subtitle" x="94" y="128">Brand strategy and audience intent become evidence-graded marketing actions.</text>

  <!-- Lane backgrounds -->
  <g>
    <rect class="lane" x="80" y="180" width="400" height="748" rx="24"/>
    <rect class="lane" x="526" y="180" width="400" height="748" rx="24"/>
    <rect class="lane" x="972" y="180" width="430" height="748" rx="24"/>
    <rect class="lane" x="1448" y="180" width="392" height="748" rx="24"/>

    <text class="laneTitle" x="112" y="222">Inputs</text>
    <text class="laneTitle" x="558" y="222">Signals</text>
    <text class="laneTitle" x="1004" y="222">Presence Rx Intelligence</text>
    <text class="laneTitle" x="1480" y="222">Outputs</text>
  </g>

  <!-- Inputs column -->
  <g filter="url(#softShadow)">
    <rect class="panel" x="112" y="258" width="336" height="150" rx="18"/>
    <circle cx="144" cy="294" r="16" fill="#171717"/>
    <text class="num" x="139" y="300">1</text>
    <text class="cardTitle" x="176" y="301">Strategy Profile</text>
    <text class="body" x="144" y="340">
      <tspan x="144" dy="0">Desired associations,</tspan>
      <tspan x="144" dy="25">ambition level, and</tspan>
      <tspan x="144" dy="25">positioning frame.</tspan>
    </text>
  </g>

  <g filter="url(#softShadow)">
    <rect class="panel" x="112" y="462" width="336" height="150" rx="18"/>
    <circle cx="144" cy="498" r="16" fill="#171717"/>
    <text class="num" x="139" y="504">2</text>
    <text class="cardTitle" x="176" y="505">Audience Layer</text>
    <text class="body" x="144" y="544">
      <tspan x="144" dy="0">Personas and profiles:</tspan>
      <tspan x="144" dy="25">design-led buyers,</tspan>
      <tspan x="144" dy="25">switchers, audio users.</tspan>
    </text>
  </g>

  <g filter="url(#softShadow)">
    <rect class="panel" x="112" y="666" width="336" height="150" rx="18"/>
    <circle cx="144" cy="702" r="16" fill="#171717"/>
    <text class="num" x="139" y="708">3</text>
    <text class="cardTitle" x="176" y="709">Prompt Universe</text>
    <text class="body" x="144" y="748">
      <tspan x="144" dy="0">Audience questions become</tspan>
      <tspan x="144" dy="25">measurable topics, prompts,</tspan>
      <tspan x="144" dy="25">engines, and competitors.</tspan>
    </text>
  </g>

  <path class="line" d="M280 408 L280 462" marker-end="url(#arrow)"/>
  <path class="line" d="M280 612 L280 666" marker-end="url(#arrow)"/>

  <!-- Signals column -->
  <g filter="url(#softShadow)">
    <rect x="558" y="258" width="336" height="178" rx="18" fill="#ffffff" stroke="#00a0be" stroke-width="2"/>
    <rect x="558" y="258" width="8" height="178" rx="4" fill="#00a0be"/>
    <text class="cardTitle" x="592" y="303">Peec MCP</text>
    <text class="body" x="592" y="344">
      <tspan x="592" dy="0">Source of truth for AI</tspan>
      <tspan x="592" dy="25">visibility: brand, topic,</tspan>
      <tspan x="592" dy="25">engine, domain, URL, chat.</tspan>
    </text>
    <text class="mono" x="592" y="414">20% visibility · #2.4 position</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="558" y="506" width="336" height="142" rx="18" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <rect x="558" y="506" width="8" height="142" rx="4" fill="#16a34a"/>
    <text class="cardTitle" x="592" y="551">Tavily</text>
    <text class="body" x="592" y="592">
      <tspan x="592" dy="0">Public proof, competitor</tspan>
      <tspan x="592" dy="25">evidence, and editorial gaps.</tspan>
    </text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="558" y="702" width="336" height="142" rx="18" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
    <rect x="558" y="702" width="8" height="142" rx="4" fill="#4f46e5"/>
    <text class="cardTitle" x="592" y="747">Gemini</text>
    <text class="body" x="592" y="788">
      <tspan x="592" dy="0">Perception themes and</tspan>
      <tspan x="592" dy="25">missing brand associations.</tspan>
    </text>
  </g>

  <path class="line" d="M448 741 C494 741 500 347 558 347" marker-end="url(#arrow)"/>

  <!-- Decision column -->
  <g filter="url(#softShadow)">
    <rect x="1004" y="258" width="366" height="408" rx="22" fill="#ffffff" stroke="#f97316" stroke-width="2.4"/>
    <rect x="1004" y="258" width="9" height="408" rx="4.5" fill="#f97316"/>
    <text class="cardTitle" x="1040" y="305">Decision Engine</text>
    <text class="body" x="1040" y="347">
      <tspan x="1040" dy="0">Combines visibility, public</tspan>
      <tspan x="1040" dy="25">proof, perception, strategy,</tspan>
      <tspan x="1040" dy="25">and audience fit.</tspan>
    </text>

    <g transform="translate(1040 436)">
      <rect class="pill" width="292" height="42" rx="12"/>
      <text class="small" x="18" y="27">Strategic status</text>
    </g>
    <g transform="translate(1040 492)">
      <rect class="pill" width="292" height="42" rx="12"/>
      <text class="small" x="18" y="27">Gap type and fix class</text>
    </g>
    <g transform="translate(1040 548)">
      <rect class="pill" width="292" height="42" rx="12"/>
      <text class="small" x="18" y="27">Action priority</text>
    </g>
    <text class="mono" x="1040" y="610">
      <tspan x="1040" dy="0">validated contracts</tspan>
      <tspan x="1040" dy="22">evidence scoring</tspan>
    </text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1004" y="720" width="366" height="138" rx="18" fill="#ffffff" stroke="#fb2c36" stroke-width="2"/>
    <rect x="1004" y="720" width="9" height="138" rx="4.5" fill="#fb2c36"/>
    <text class="cardTitle" x="1040" y="765">Claim Guardrail</text>
    <text class="body" x="1040" y="806">
      <tspan x="1040" dy="0">Allowed, needs evidence,</tspan>
      <tspan x="1040" dy="25">blocked, or off-strategy.</tspan>
    </text>
  </g>

  <path class="line" d="M894 347 C936 347 950 446 1004 446" marker-end="url(#arrow)"/>
  <path class="line" d="M894 577 C936 577 950 496 1004 496" marker-end="url(#arrow)"/>
  <path class="line" d="M894 773 C936 773 950 546 1004 546" marker-end="url(#arrow)"/>
  <path class="line" d="M1187 666 L1187 720" marker-end="url(#arrow)"/>

  <!-- Outputs column -->
  <g filter="url(#softShadow)">
    <rect x="1480" y="274" width="328" height="150" rx="18" fill="#ffffff" stroke="#9333ea" stroke-width="2"/>
    <rect x="1480" y="274" width="8" height="150" rx="4" fill="#9333ea"/>
    <text class="cardTitle" x="1514" y="319">Lovable Dashboard</text>
    <text class="body" x="1514" y="360">
      <tspan x="1514" dy="0">Executive workflow for</tspan>
      <tspan x="1514" dy="25">diagnosis, evidence, and</tspan>
      <tspan x="1514" dy="25">claim testing.</tspan>
    </text>
  </g>

  <g filter="url(#softShadow)">
    <rect class="panel" x="1480" y="496" width="328" height="150" rx="18"/>
    <text class="cardTitle" x="1514" y="541">Verdict Pack</text>
    <text class="body" x="1514" y="582">
      <tspan x="1514" dy="0">Action brief, evidence ledger,</tspan>
      <tspan x="1514" dy="25">safe rewrites, exportable</tspan>
      <tspan x="1514" dy="25">markdown and JSON.</tspan>
    </text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1480" y="718" width="328" height="126" rx="18" fill="#ffffff" stroke="#00a0be" stroke-width="2"/>
    <rect x="1480" y="718" width="8" height="126" rx="4" fill="#00a0be"/>
    <text class="cardTitle" x="1514" y="763">Peec Writes</text>
    <text class="body" x="1514" y="804">
      <tspan x="1514" dy="0">Monitoring prompts and</tspan>
      <tspan x="1514" dy="25">campaign tags for follow-up.</tspan>
    </text>
  </g>

  <path class="line" d="M1370 462 C1422 462 1426 349 1480 349" marker-end="url(#arrow)"/>
  <path class="line" d="M1370 542 C1422 542 1426 571 1480 571" marker-end="url(#arrow)"/>
  <path class="line" d="M1370 775 C1422 775 1426 781 1480 781" marker-end="url(#arrow)"/>

  <!-- Bottom proof statement -->
  <g transform="translate(80 966)">
    <rect class="pill" width="1760" height="76" rx="20"/>
    <text class="quote" x="32" y="31">Core demo claim</text>
    <text class="body" x="228" y="31">Peec measures what AI says. Presence Rx decides what marketers should do, say, test, or refuse.</text>
    <g transform="translate(32 47)">
      <rect x="0" y="0" width="244" height="24" rx="8" fill="#eaf8fb"/>
      <text class="tag" x="12" y="17">Peec = visibility truth</text>
      <rect x="266" y="0" width="220" height="24" rx="8" fill="#eef8f0"/>
      <text class="tag" x="278" y="17">Tavily = public proof</text>
      <rect x="508" y="0" width="234" height="24" rx="8" fill="#eeedff"/>
      <text class="tag" x="520" y="17">Gemini = perception</text>
      <rect x="764" y="0" width="338" height="24" rx="8" fill="#fff3e8"/>
      <text class="tag" x="776" y="17">Presence Rx = decision logic</text>
      <rect x="1124" y="0" width="218" height="24" rx="8" fill="#f6edff"/>
      <text class="tag" x="1136" y="17">Lovable = workflow</text>
    </g>
  </g>
</svg>
